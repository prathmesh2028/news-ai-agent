# 📰 AI News Agent — Daily Email Scheduler (GitHub Actions)
# ═══════════════════════════════════════════════════════════════════════════════
# PURPOSE:
#   Runs the AI News pipeline automatically every day at 08:00 AM IST (2:30 AM UTC).
#   Fetches news → Summarises with Gemini → Sends email digest via Gmail SMTP.
#
# SETUP:
#   Go to your GitHub repo → Settings → Secrets and variables → Actions
#   Add these Repository Secrets:
#     • GEMINI_API_KEY    — Your Google Gemini API key
#     • NEWS_API_KEY      — Your NewsAPI.org key
#     • EMAIL_ADDRESS     — Gmail address that SENDS the email
#     • EMAIL_PASSWORD    — Gmail App Password (16-char)
#     • EMAIL_RECIPIENT   — Email address that RECEIVES the digest
#
# MANUAL TRIGGER:
#   You can also run this manually from the Actions tab → "Daily AI News Email"
#   → "Run workflow" button. Useful for testing.
#
# NOTES:
#   - GitHub Actions cron uses UTC timezone. 08:00 IST = 02:30 UTC.
#   - GitHub may delay cron jobs by a few minutes during high-demand periods.
#   - The workflow will NOT run if the repo has had no activity for 60 days.
#     To prevent this, GitHub sends a warning email — just visit the repo
#     or push a commit to keep it active.
# ═══════════════════════════════════════════════════════════════════════════════

name: Daily AI News Email

on:
  # ── Scheduled trigger: runs daily at 02:30 UTC (08:00 AM IST) ──────────────
  schedule:
    - cron: "30 2 * * *"

  # ── Manual trigger: lets you run it anytime from the GitHub Actions tab ─────
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-daily-email:
    name: 📰 Fetch News & Send Email
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Safety: kill the job if it hangs for over 10 minutes

    steps:
      # ── Step 1: Checkout the code ──────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ──────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # Caches pip packages to speed up future runs

      # ── Step 3: Install dependencies ───────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Run the AI News pipeline ───────────────────────────────────
      # This runs main.py which calls the full pipeline:
      #   fetch news → summarise with Gemini → render HTML → send email
      - name: 🚀 Run AI News Agent pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: "587"
          GEMINI_MODEL: gemini-2.5-flash
        run: python main.py
